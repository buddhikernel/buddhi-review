# ──────────────────────────────────────────────────────────────────────────────
# Label-gated CI — buddhi-review's own CI runs only when the `ready-for-ci` label
# is present. The merge automation (the Buddhi review loop) adds that label right
# before it merges; the job below runs only when the label is present, then the
# loop waits for it to go green before merging. Pushes made before the label is
# applied are skipped (SKIPPED-IS-SUCCESS by design — see the job-level `if`).
#
# Note: the workflow fires on both `labeled` and `synchronize` events. If new
# commits are pushed while `ready-for-ci` is already applied, this job re-runs —
# so it may run more than once per PR in that case.
#
# This is buddhi-review's real CI — the full pytest suite + the fail-closed
# publish-readiness gate — so the gate is a genuine merge check, not the
# `exit 1` placeholder the setup wizard ships for a brand-new repo.
# ──────────────────────────────────────────────────────────────────────────────
name: Ready-for-CI

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read

jobs:
  ci:
    # The gate: the job is skipped unless the `ready-for-ci` label is on the PR, so
    # pushes made before the label is added never spend a runner. SKIPPED-IS-SUCCESS
    # is intentional — the GATE is the merge automation (it adds the label, which
    # fires a fresh run of this job, and waits for THAT run to go green). Do NOT mark
    # this check as a REQUIRED status check in branch protection — that is the one
    # posture where a pre-label skipped-success could satisfy the merge before the
    # real labeled run executes.
    if: contains(github.event.pull_request.labels.*.name, 'ready-for-ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
      # buddhi-review's real CI: the full pytest suite + the fail-closed
      # publish-readiness gate (the repo's only full-suite + publish-gate run).
      - run: pip install -e '.[test]' build setuptools wheel
      - run: python -m pytest -q
      - run: python tools/publish_gate.py scan
