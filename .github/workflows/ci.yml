# CI for the free buddhi-review skill (public repo).
#
# Two jobs:
#   * tests        — the full pytest suite (network-free; conftest pins the gh /
#                    model seams), run on every push + PR.
#   * publish-gate — the FREE-3 release-blocking, fail-closed publish-readiness
#                    gate: build the sdist + wheel from a CLEAN source, unpack
#                    BOTH, grep every shipped text file for paid/internal product
#                    names, paid identifier names, and publish-gate strings, and
#                    assert the wheel ships no compiled extension. A forbidden
#                    leak fails the job (non-zero exit) and blocks the release.
#
# This is the gate that protects the PyPI publish: nothing paid can ride the
# free wheel without turning this job red.
name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
      # Runtime deps (buddhikernel + PyYAML) + the test extra + the build
      # backend the publish-gate test shells out to.
      - run: pip install -e '.[test]' build
      - run: python -m pytest -q

  publish-gate:
    # Gate the release-blocking scan on a green test run so a passing gate never
    # implies passing tests (they would otherwise run in parallel).
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
      # The gate only builds + scans bytes; it does NOT import buddhi_review, so
      # it needs the build backend but not the runtime deps.
      - run: pip install build setuptools wheel
      - name: Fail-closed publish-readiness gate (built-artifact scan)
        run: python tools/publish_gate.py scan
