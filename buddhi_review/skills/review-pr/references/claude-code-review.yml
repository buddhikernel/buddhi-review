name: Claude Code Review
# PR reviewer powered by Claude. Auth uses whichever credential the repo has set:
# CLAUDE_CODE_OAUTH_TOKEN (a `claude setup-token` subscription credential, so review
# usage bills to the Claude subscription) or ANTHROPIC_API_KEY (a pay-as-you-go API
# key). Either works; the job passes both inputs and the action uses whichever
# secret is set. A subscription OAuth token has a 365-day lifetime; rotate it before
# it silently 401s (track the issue date and set a calendar reminder ~11 months out).
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read          # review-only: the action must NOT push commits/fixes
  pull-requests: write    # post inline review comments
  issues: write           # post top-level PR comments (GitHub routes PR timeline comments through the issues API)
  id-token: write         # REQUIRED by anthropics/claude-code-action@v1: without
                          # this, every run fails with "Could not fetch an OIDC
                          # token" before reaching auth — claude[bot] posts only
                          # its initial 👀 sticky and never gets to the actual
                          # review comments.

jobs:
  review:
    # Mention-driven only: a human's or the review loop's "@claude" comment is
    # the sole trigger. Deliberately no `pull_request: synchronize` trigger —
    # otherwise every loop fix-commit push would fire Claude twice (once on the
    # push, once on the loop's own "@claude review" nudge) and race the loop.
    # The local review loop owns the re-review cadence.
    #
    # PR-only guard is already enforced: for `issue_comment`,
    # `github.event.issue.pull_request` is truthy ONLY on a PR (null on a plain
    # issue), so ordinary-issue "@claude" mentions never run this job; the
    # `pull_request_review_comment` branch covers review-comment events. The
    # `contains('@claude')` match is intentionally loose (not an exact phrase /
    # actor allowlist) so BOTH a human and the review loop's "@claude review"
    # nudge trigger it; unauthorized-actor protection is already provided by
    # claude-code-action's built-in write-access permission gate.
    if: ${{ contains(github.event.comment.body, '@claude') && (github.event.issue.pull_request || github.event_name == 'pull_request_review_comment') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # For issue_comment events, checkout defaults to the default branch,
          # not the PR head. Fetch the PR head so Read/Glob/Grep see the actual
          # changed files rather than stale base-branch contents.
          ref: refs/pull/${{ github.event.issue.number || github.event.pull_request.number }}/head
      - uses: anthropics/claude-code-action@v1
        # Stable step id so the auth-failure guard below can read this step's
        # `execution_file` output (the on-disk JSON log of SDK messages).
        id: claude_review
        with:
          # Surface the SDK's per-tool transcript in the Actions log. Without
          # this the SDK redacts everything past the init banner ("Running
          # Claude Code via SDK (full output hidden for security)"), so a
          # silent-give-up — `success` with `permission_denials_count: 1` and
          # zero comments posted — gives no way to identify which tool was
          # denied. Defaulting to false here because this is a shipped template:
          # on a private repo, full output logs every file the SDK reads, which
          # can expose repository content to anyone with Actions log access.
          # Set to true temporarily when diagnosing silent tool-denial failures.
          show_full_output: false
          # Auth: pass BOTH credentials as explicit inputs and let the action use
          # whichever secret the repo has set. An unset secret renders to an empty
          # input, which the action ignores, so a repo that holds only one of the
          # two still authenticates. claude-code-action@v1 no longer reads the token
          # from the step's env: block (runs fail at "Environment variable validation
          # failed" before reaching the model), so both must be explicit inputs.
          # CLAUDE_CODE_OAUTH_TOKEN (a `claude setup-token` subscription credential)
          # bills to the Claude subscription; ANTHROPIC_API_KEY bills pay-as-you-go.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Three load-bearing prompt contracts the review loop depends on:
          #
          # 1. Findings MUST be inline review comments. The review loop only
          #    processes inline review comments in its fix batch; top-level
          #    review bodies and PR-level issue comments are scanned only for
          #    clean/quota/error signals, never fixed. A substantive finding
          #    placed in the top-level comment would be ignored and merged past.
          #    So the prompt forces every finding inline and reserves the
          #    top-level comment for the clean sentinel alone.
          # 2. The trailing "No issues found." sentinel is load-bearing: it
          #    matches the review loop's clean-review detector pattern
          #    (r"no (issues?|...) (found|detected|to report)") with no
          #    "but/however", so the loop flips Claude to voluntarily-done with
          #    zero Claude-specific regexes. The detector has no mixed-feedback
          #    negative lookahead, so contract 1 (findings never share the
          #    top-level comment with the sentinel) is what keeps a dirty review
          #    from being misread as clean.
          #    The sentinel only counts when POSTED as a PR comment: the review
          #    loop reads comments on the PR, never the action's final message,
          #    so the prompt below makes posting it a mandatory FINAL action.
          #    A narrated-but-unposted sentinel reads as "no review" and stalls
          #    the loop until it times out. This holds on a clean re-review too:
          #    nothing left to flag still requires POSTING the sentinel.
          # 3. The PR number is PINNED into the prompt via GitHub Actions
          #    expression interpolation. Without this, claude-code-action@v1
          #    no longer auto-injects "you are reviewing PR #N" context, and
          #    Claude runs `gh pr list`, sees multiple open PRs, and bails out
          #    by calling the built-in AskUserQuestion tool — which in a
          #    headless Actions runner is a silent-give-up: the action exits
          #    `success` with zero comments posted. Paired with
          #    `--disallowedTools "AskUserQuestion"` in claude_args below,
          #    which removes the escape hatch so any prompt ambiguity surfaces
          #    as a tool denial in the log rather than a silent no-op.
          #    For `issue_comment` events, the PR number is at
          #    `github.event.issue.number`; for
          #    `pull_request_review_comment`, it's at
          #    `github.event.pull_request.number`. One of those is always set
          #    given the `on:` triggers above.
          prompt: >-
            You are reviewing pull request
            #${{ github.event.issue.number || github.event.pull_request.number }}
            in the repository ${{ github.repository }}. The PR number is fixed
            by the comment that triggered this run — do NOT call
            AskUserQuestion to ask which PR to review, and do NOT run
            `gh pr list` to choose one. Use `gh pr view
            ${{ github.event.issue.number || github.event.pull_request.number }}`
            and `gh pr diff
            ${{ github.event.issue.number || github.event.pull_request.number }}`
            to fetch the diff and metadata.


            Review this PR for logic errors, security issues, and regressions.
            Post every finding as an INLINE review comment on the specific
            file and line it concerns. The automated review loop only acts on
            inline review comments; a substantive finding placed in the
            top-level PR comment is ignored and merged past. Do NOT put
            findings in the top-level comment, and do NOT commit or push any
            changes.


            If and only if you find zero issues, you MUST post the clean
            sentinel by ACTUALLY RUNNING this command as your FINAL action —
            invoking the tool, not describing it:
            `gh pr comment
            ${{ github.event.issue.number || github.event.pull_request.number }}
            --body "No issues found."` — a top-level comment whose last line is
            exactly this line on its own: No issues found.
            Do NOT merely WRITE "No issues found." in your reply and stop: the
            review loop reads ONLY comments POSTED to the PR, never your final
            message, so a sentinel you did not post is invisible to it and stalls
            the loop for ~30 minutes before it gives up on you. A clean review
            you did not POST counts as NO review at all. This applies on EVERY
            run, INCLUDING a re-review where your earlier findings are now all
            resolved — if there is nothing left to flag, your job is not done
            until you have POSTED the sentinel.


            Before reviewing, classify each changed file by the part of the
            codebase it belongs to and apply the repository's own conventions.
            If the repo documents review or contribution standards (for example
            in README.md, CONTRIBUTING.md, or an agent-instruction file such as
            CLAUDE.md or AGENTS.md), read them and apply them alongside the
            standard criteria above. Review documentation-only and
            design/planning files for clarity, naming, and cross-reference
            consistency rather than for test coverage or implementation detail;
            give code files the full logic, security, and test-coverage review.
            Mixed PRs apply both rubrics file-by-file.
          # claude_args: explicit allowlist is REQUIRED. Without it the SDK
          # denies every GitHub tool call (permission_denials, zero comments
          # posted, SDK still exits "success"). Tools mirror
          # anthropics/claude-code-action's own examples/pr-review-*.yml:
          #   - mcp__github_inline_comment__create_inline_comment: the MCP
          #     tool the action ships for posting inline review comments
          #     (the only finding channel the review loop consumes).
          #   - Bash(gh pr comment:*): needed so Claude can post the
          #     load-bearing top-level "No issues found." sentinel that the
          #     clean-review detector matches on a clean review.
          #   - Bash(gh pr diff:*) / Bash(gh pr view:*): read-only context
          #     fetches Claude uses while reviewing.
          #   - Read / Glob / Grep: read-only filesystem access so Claude can
          #     open individual changed files for full context on multi-file
          #     PRs. Without these, Claude gave up without posting EITHER
          #     inline findings OR the "No issues found." sentinel on large
          #     PRs, and the loop's quiet-bot ask gate kept re-poking. Safe
          #     because the job already has `contents: read` and no write tools.
          #   - Bash(gh pr review:*): Claude reaches for `gh pr review --comment`
          #     as a natural alternative to `gh pr comment` for the top-level
          #     sentinel; without it the model gives up after the denial
          #     instead of falling back to `gh pr comment`.
          # --disallowedTools "AskUserQuestion": the built-in AskUserQuestion
          # tool is implicitly available to the SDK and was Claude's escape
          # hatch when the prompt didn't pin a PR — Claude called it, the
          # headless runner could never answer, and the action terminated
          # `success` with zero comments posted. Pairs with the PR-pin in the
          # prompt above: belt-and-suspenders, so any future prompt ambiguity
          # surfaces as a tool denial in the log rather than a silent no-op.
          #
          # Note: Bash(gh pr list:*) and Bash(gh api:*) are intentionally
          # omitted. The prompt already forbids `gh pr list` to choose a PR,
          # and `gh api:*` with the job's `issues: write`/`pull-requests: write`
          # permissions would allow write operations (add labels, close PRs,
          # etc.) beyond the reviewer's intended scope. Read/Glob/Grep plus
          # `gh pr view`/`gh pr diff` are sufficient for full review context.
          #
          # --model opus pins the reviewer to Opus via the `opus` ALIAS, not a
          # versioned literal — the alias auto-resolves to the latest Opus the
          # OAuth token authenticates against, so the reviewer tracks new Opus
          # releases without a workflow edit.
          claude_args: >-
            --model opus
            --disallowedTools "AskUserQuestion"
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git branch:*),Bash(wc:*),Bash(cat:*),Bash(echo:*),Read,Glob,Grep"
      # Make a silent Claude auth failure RED instead of green-success. An
      # invalid/expired CLAUDE_CODE_OAUTH_TOKEN makes the model call 401: the
      # action above posts ZERO comments yet still concludes `success`, so to the
      # review loop and the operator it looks exactly like "Claude reviewed and
      # found nothing" — and the loop waits its full silent-review window each
      # round on a non-response. This post-step inspects the action's execution
      # output and fails the check on the token-invalid signature so the failure
      # is visible. Fully self-contained (inline jq + grep, no repo files)
      # because this workflow is copied verbatim into third-party repos.
      - name: Fail the check on a Claude authentication error
        # if: always() is load-bearing: the action concludes `success` on a 401,
        # so a success()-gated step would be skipped and the failure would stay
        # invisible. Run regardless of the action's outcome.
        if: always()
        shell: bash
        env:
          CLAUDE_EXECUTION_FILE: ${{ steps.claude_review.outputs.execution_file }}
        run: |
          set -uo pipefail
          f="${CLAUDE_EXECUTION_FILE:-}"
          # A missing or empty execution file is never an auth signal on its own:
          # passing here can only ever LET a clean/quiet run stay green, never
          # turn one red. A genuinely failed action step is already red by
          # itself; the local review loop surfaces a missing run separately.
          if [ -z "$f" ] || [ ! -s "$f" ]; then
            echo "No Claude execution file to inspect — nothing to flag."
            exit 0
          fi
          # jq is preinstalled on ubuntu-latest. If it is somehow unavailable we
          # cannot tell a clean run from a 401 (the is_error gate below needs
          # it), so skip rather than risk turning a clean review red on a tooling
          # gap — fail-safe toward green, never a false red.
          if ! command -v jq >/dev/null 2>&1; then
            echo "jq unavailable — skipping the Claude auth-failure check."
            exit 0
          fi
          # The execution file is a JSON array of Claude Agent SDK messages
          # (anthropics/claude-code-action base-action/src/execution-file.ts —
          # JSON.stringify(messages)). On an invalid/expired
          # CLAUDE_CODE_OAUTH_TOKEN the model call 401s and the SDK records
          # is_error:true plus the auth error text, while the action still
          # concludes success having posted nothing.
          #
          # Fail ONLY when BOTH hold:
          #   1. the token-invalid auth signature appears in a non-user message
          #      (result/assistant/system), AND
          #   2. the run produced NO cleanly-successful result message (every
          #      clean review ends in a result message with is_error:false).
          # Condition 1 scopes the grep to SDK-emitted messages only, so PR diff
          # content and tool_result bodies (which arrive in user messages) cannot
          # trigger this check even when a run fails for an unrelated reason.
          # Condition 2 is belt-and-suspenders: a clean review always ends with
          # is_error:false on the result message, so a successful run can never
          # fire even if the assistant echoed the phrase in commentary.
          #
          # Deliberately NOT a bare "401": the App-not-installed failure is also
          # a 401 but reads "Claude Code is not installed on this repository" and
          # needs a different fix (install the GitHub App), so it must not trip
          # this token-re-mint message.
          sig="$(jq -r '.. | objects | select(.type == "result" or .type == "assistant" or .type == "system") | (.result // empty), (.. | objects | .text // empty)' "$f" 2>/dev/null | grep -iEc 'invalid bearer token|authentication_error|authentication_failed|oauth authentication failed' || true)"
          clean_success="$(jq -r 'any(.. | objects | select(.type == "result"); .is_error == false)' "$f" 2>/dev/null || echo false)"
          if [ "${sig:-0}" -gt 0 ] && [ "$clean_success" != "true" ]; then
            echo "::error title=Claude review auth failed::CLAUDE_CODE_OAUTH_TOKEN is invalid or expired — the Claude review returned 401 (Invalid bearer token) and posted nothing while the job stayed green. Re-mint and re-store it: run \`claude setup-token\`, then set the CLAUDE_CODE_OAUTH_TOKEN repo secret (e.g. via the /review-pr setup wizard)."
            exit 1
          fi
          echo "No Claude authentication failure detected."
          exit 0
