# Plan → role → model/effort table.
#
# The engine reasons in tier ALIASES (opus / sonnet / haiku — valid `claude
# --model` values); each plan's tier_map resolves an alias at the single
# `claude --model` boundary in model_call.py. Pro has no Opus access, so its
# map resolves opus → sonnet; nothing else differs between plans.
#
# Effort is PLAN-INDEPENDENT — sized to the role's job, identical across plans
# (classifier=medium, detectors + fix-verify=low, fix-substantive=high), and
# passed EXPLICITLY on `claude --effort` so a distributed skill behaves
# identically on every machine instead of inheriting the host's settings.

roles:
  classifier:            {model: sonnet, effort: medium}
  clean-review-detector: {model: haiku,  effort: low}
  quota-detector:        {model: haiku,  effort: low}
  fix-verify:            {model: haiku,  effort: low}
  fix-substantive:       {model: sonnet, effort: high}
  fix-cosmetic:          {model: haiku,  effort: low}
  pr-description-rewriter: {model: sonnet, effort: low}

plans:
  pro:
    tier_map: {opus: sonnet, sonnet: sonnet, haiku: haiku}
  max-5x:
    tier_map: {opus: opus, sonnet: sonnet, haiku: haiku}
  max-20x:
    tier_map: {opus: opus, sonnet: sonnet, haiku: haiku}
