<text x="16.0" y="55.0" font-size="12" fill="#adbac7">them). Bar height: the share of that run’s bugs that Claude caught. The</text>
<text x="16.0" y="71.0" font-size="12" fill="#adbac7">bold line is the aggregate over all 88 qualifying runs (681 bugs). Ledger</text>
<text x="16.0" y="87.0" font-size="12" fill="#adbac7">data, repo anonymized.</text>
