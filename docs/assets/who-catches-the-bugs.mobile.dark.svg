<text x="368.0" y="251.0" font-size="12" font-weight="700" text-anchor="end" fill="#e6edf3">Claude = 3.8%</text>
<text x="16.0" y="305.0" font-size="12" fill="#8b949e">Flat stubs are zero. In 14 of these 20 runs Claude reviewed the code</text>
<text x="16.0" y="321.0" font-size="12" fill="#8b949e">and caught nothing.</text>
<text x="16.0" y="340.0" font-size="13" font-weight="700" fill="#ff7b72">Across all 88 qualifying runs, Claude caught 3.8% of the valid</text>
<text x="16.0" y="357.0" font-size="13" font-weight="700" fill="#ff7b72">bugs. Reviewers from other vendors caught 96.2%.</text>
<text x="16.0" y="375.0" font-size="12" fill="#8b949e">Claude caught 18 of the 189 high or critical bugs (9.5%). Of the high or</text>
<text x="16.0" y="391.0" font-size="12" fill="#8b949e">critical bugs found in round 2 or later, 93.5% came from a non-Claude</text>
<text x="16.0" y="407.0" font-size="12" fill="#8b949e">reviewer.</text>
