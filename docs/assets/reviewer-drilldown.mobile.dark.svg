<text x="16.0" y="489.0" font-size="12" fill="#8b949e">none of those comments identified a valid bug. Each bug is credited to</text>
<text x="16.0" y="505.0" font-size="12" fill="#8b949e">one catching reviewer. Ledger data, repo anonymized.</text>
