<svg viewBox="0 0 430 491" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<text x="16.0" y="20.0" font-size="16" font-weight="700" fill="#e6edf3">Share of bugs caught in round 2+, per</text>
<text x="16.0" y="41.0" font-size="16" font-weight="700" fill="#e6edf3">review run</text>
<text x="16.0" y="60.0" font-size="12" fill="#adbac7">Each bar is one qualifying run with 10 or more valid bugs (all 20</text>
<text x="16.0" y="76.0" font-size="12" fill="#adbac7">of them). Bar height: the share of that run’s bugs found after</text>
<text x="16.0" y="92.0" font-size="12" fill="#adbac7">round 1. The bold line is the aggregate over all 88 qualifying runs</text>
<text x="16.0" y="108.0" font-size="12" fill="#adbac7">(681 bugs). Ledger data, repo anonymized.</text>
<line x1="46" y1="293.0" x2="414" y2="293.0" stroke="#2a3038" stroke-width="1"/>
