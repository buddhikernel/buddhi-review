<text x="414.0" y="203.9" font-size="12" font-weight="700" text-anchor="end" fill="#e6edf3">50.1% in round 2+</text>
<text x="16.0" y="326.0" font-size="12" fill="#8b949e">Runs with more bugs tend to earn more review rounds, so most</text>
<text x="16.0" y="342.0" font-size="12" fill="#8b949e">of these bars sit above the all-runs line.</text>
<text x="16.0" y="359.0" font-size="13" font-weight="700" fill="#ff7b72">Across all 88 qualifying runs, 50.1% of valid bugs, and</text>
<text x="16.0" y="376.0" font-size="13" font-weight="700" fill="#ff7b72">49.2% of the 189 high or critical ones, were caught</text>
<text x="16.0" y="393.0" font-size="13" font-weight="700" fill="#ff7b72">only in</text>
<text x="16.0" y="410.0" font-size="13" font-weight="700" fill="#ff7b72">round 2+.</text>
<text x="16.0" y="426.0" font-size="12" fill="#8b949e">On the 20 runs shown as bars, the round 2+ share is 65.4%. A</text>
<text x="16.0" y="442.0" font-size="12" fill="#8b949e">reviewer that stops after one round would have shipped every bug</text>
<text x="16.0" y="458.0" font-size="12" fill="#8b949e">counted in</text>
<text x="16.0" y="474.0" font-size="12" fill="#8b949e">these bars.</text>
</svg>
