<text x="713" y="264.6" font-size="11.5" font-weight="700" fill="#fff" text-anchor="middle">all 123 runs: 52.6% in R2+</text>
<text x="110" y="492" font-size="11" fill="#777">each bar = one run with 10+ valid bugs (share of its bugs caught in round 2+); larger changes tend to earn more rounds, so most &#8212; not all &#8212; of these bars sit above the all-runs line</text>
<text x="110" y="520" font-size="13" font-weight="700" fill="#B01722">Across ALL 123 runs, 52.6% of valid bugs &#8212; and 53.6% of the 291 high/critical ones &#8212; surfaced only in round 2 or later.</text>
<text x="110" y="542" font-size="10.5" fill="#999">A reviewer that posts one round of comments and stops would have shipped half the real bugs. On 10+-bug runs the round-2+ share is 68.9%.</text>
