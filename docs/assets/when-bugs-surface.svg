<text x="675.2" y="263.7" font-size="11.5" font-weight="700" fill="#fff" text-anchor="middle">all 88 qualifying runs: 50.1% in round 2+</text>
<text x="55.0" y="472" font-size="11" fill="#777">Runs with more bugs tend to earn more review rounds, so most of these bars sit above the all-runs line.</text>
<text x="55.0" y="497" font-size="13" font-weight="700" fill="#B01722">Across all 88 qualifying runs, 50.1% of valid bugs, and 49.2%</text>
<text x="55.0" y="514" font-size="13" font-weight="700" fill="#B01722">of the 189 high or critical ones, were caught only in round 2+.</text>
<text x="55.0" y="533" font-size="10.5" fill="#999">On the 20 runs shown as bars, the round 2+ share is 65.4%. A reviewer that</text>
<text x="55.0" y="547" font-size="10.5" fill="#999">stops after one round would have shipped every bug counted in these bars.</text>
