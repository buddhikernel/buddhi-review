<text x="414.0" y="182.9" font-size="12" font-weight="700" text-anchor="end" fill="#1f2328">50.1% in round 2+</text>
<text x="16.0" y="305.0" font-size="12" fill="#8b949e">Runs with more bugs tend to earn more review rounds, so most of these</text>
<text x="16.0" y="321.0" font-size="12" fill="#8b949e">bars sit above the all-runs line.</text>
<text x="16.0" y="338.0" font-size="13" font-weight="700" fill="#B01722">Across all 88 qualifying runs, 50.1% of valid bugs, and 49.2% of</text>
<text x="16.0" y="355.0" font-size="13" font-weight="700" fill="#B01722">the 189 high or critical ones, were caught only in</text>
<text x="16.0" y="372.0" font-size="13" font-weight="700" fill="#B01722">round 2+.</text>
<text x="16.0" y="388.0" font-size="12" fill="#8b949e">On the 20 runs shown as bars, the round 2+ share is 65.4%. A reviewer</text>
<text x="16.0" y="404.0" font-size="12" fill="#8b949e">that stops after one round would have shipped every bug counted in</text>
<text x="16.0" y="420.0" font-size="12" fill="#8b949e">these bars.</text>
</svg>
