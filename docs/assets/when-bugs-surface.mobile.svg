<text x="16.0" y="20.0" font-size="16" font-weight="700" fill="#1f2328">Share of bugs caught in round 2+, per review run</text>
<text x="16.0" y="39.0" font-size="12" fill="#57606a">Each bar is one qualifying run with 10 or more valid bugs (all 20 of them).</text>
<text x="16.0" y="55.0" font-size="12" fill="#57606a">Bar height: the share of that run’s bugs found after round 1. The bold line</text>
<text x="16.0" y="71.0" font-size="12" fill="#57606a">is the aggregate over all 88 qualifying runs (681 bugs). Ledger data, repo</text>
<text x="16.0" y="87.0" font-size="12" fill="#57606a">anonymized.</text>
