<svg viewBox="0 0 1060 547" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<defs><marker id="ar" markerWidth="11" markerHeight="11" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#6e7781"/></marker><marker id="arL" markerWidth="11" markerHeight="11" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#6e7781"/></marker></defs>
<text x="53" y="34" font-size="18" font-weight="700" fill="#1f2328">How a Buddhi review loop works</text>
<text x="53" y="58" font-size="12.5" fill="#57606a">Different labs. Targeted re-review. Auto-merge only when enabled.</text>
<rect x="53" y="96" width="140" height="32" rx="16" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
<text x="123" y="117" text-anchor="middle" font-size="12.5" fill="#1f2328">Pull request</text>
<path d="M123,128 L123,154" fill="none" stroke="#6e7781" stroke-width="2" marker-end="url(#ar)"/>
<rect x="53" y="156" width="286" height="211" rx="11" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
<text x="67" y="180" font-size="13.5" font-weight="700" fill="#1f2328">1 · Review with a cross-vendor panel</text>
<circle cx="72" cy="250" r="5" fill="#C2410C"/>
<text x="83" y="254" font-size="13" fill="#1f2328">Claude</text>
<circle cx="206" cy="250" r="5" fill="#2A78D6"/>
<text x="217" y="254" font-size="13" fill="#1f2328">Codex</text>
<circle cx="72" cy="272" r="5" fill="#1BAF7A"/>
<text x="83" y="276" font-size="13" fill="#1f2328">Gemini</text>
<circle cx="206" cy="272" r="5" fill="#8B95A5"/>
<text x="217" y="276" font-size="13" fill="#1f2328">Copilot</text>
<text x="67" y="353" font-size="11.5" fill="#57606a">Different labs have different blind spots.</text>
<rect x="387" y="156" width="286" height="211" rx="11" fill="#eef1f4" stroke="#b6bec8" stroke-width="1.5"/>
<text x="401" y="180" font-size="13.5" font-weight="700" fill="#1f2328">2 · Decide each finding</text>
<rect x="575" y="166" width="84" height="18" rx="9" fill="#e7ecf1" stroke="#c4ccd6" stroke-width="0.75"/>
<text x="617" y="179" font-size="10.5" text-anchor="middle" fill="#57606a">Buddhi kernel</text>
<text x="401" y="227" font-size="12.5" font-weight="700" fill="#1f2328">Fix</text>
<text x="469" y="227" font-size="12.5" fill="#57606a">code or PR description</text>
<text x="401" y="248" font-size="12.5" font-weight="700" fill="#9a5b00">Ask you</text>
<text x="469" y="248" font-size="12.5" fill="#57606a">genuine judgment needed</text>
<text x="401" y="269" font-size="12.5" font-weight="700" fill="#1f2328">Skip</text>
<text x="469" y="269" font-size="12.5" fill="#57606a">invalid or outdated</text>
<text x="401" y="290" font-size="12.5" font-weight="700" fill="#1f2328">Defer</text>
<text x="469" y="290" font-size="12.5" fill="#57606a">interruption limit reached</text>
<line x1="401" y1="325" x2="659" y2="325" stroke="#d0d7de" stroke-width="0.75"/>
<text x="401" y="338" font-size="10.5" fill="#8b949e">Every finding gets an explicit disposition — never blind</text>
<text x="401" y="353" font-size="10.5" fill="#8b949e">auto-fix.</text>
<rect x="721" y="156" width="286" height="211" rx="11" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
<text x="735" y="180" font-size="13.5" font-weight="700" fill="#1f2328">3 · Re-review the fixed code</text>
<text x="735" y="248" font-size="11.5" fill="#1f2328">Re-request reviewers that found substantive issues.</text>
<text x="735" y="270" font-size="11.5" fill="#57606a">Skip those that approved, found nothing, or were</text>
<text x="735" y="286" font-size="11.5" fill="#57606a">cosmetic-only.</text>
<text x="735" y="353" font-size="12" font-weight="700" fill="#1f2328">Repeat until clean — or the round budget is</text>
<text x="735" y="369" font-size="12" font-weight="700" fill="#1f2328">reached.</text>
<path d="M339,262 L382,262" fill="none" stroke="#6e7781" stroke-width="2" marker-end="url(#ar)"/>
<path d="M673,262 L716,262" fill="none" stroke="#6e7781" stroke-width="2" marker-end="url(#ar)"/>
<path d="M745,367 L745,407 L33,407 L33,262 L50,262" fill="none" stroke="#6e7781" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar)"/>
<text x="389" y="399" font-size="11" text-anchor="middle" fill="#57606a">Substantive fixes applied — review the updated code</text>
<path d="M872,367 L872,427" fill="none" stroke="#6e7781" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="882" y="399" font-size="11" font-weight="700" fill="#1a7f37">✓ Clean round</text>
<rect x="53" y="429" width="954" height="104" rx="11" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
<text x="67" y="455" font-size="13.5" font-weight="700" fill="#1f2328">4 · Validate and land</text>
<rect x="67" y="469" width="94" height="26" rx="6" fill="#eef1f4" stroke="#d0d7de" stroke-width="0.75"/>
<text x="114" y="486" font-size="11.5" text-anchor="middle" fill="#1f2328">Run tests / CI</text>
<rect x="436" y="469" width="136" height="26" rx="6" fill="#eef1f4" stroke="#d0d7de" stroke-width="0.75"/>
<text x="504" y="486" font-size="11.5" text-anchor="middle" fill="#1f2328">Require green checks</text>
<rect x="892" y="469" width="101" height="26" rx="6" fill="#eef1f4" stroke="#d0d7de" stroke-width="0.75"/>
<text x="942" y="486" font-size="11.5" text-anchor="middle" fill="#1f2328">Squash-merge</text>
<path d="M166,482 L430,482" fill="none" stroke="#6e7781" stroke-width="2" marker-end="url(#ar)"/>
<path d="M576,482 L886,482" fill="none" stroke="#6e7781" stroke-width="2" marker-end="url(#ar)"/>
<text x="67" y="514" font-size="10.5" fill="#8b949e">Tests and CI decide whether the PR can land. Auto-merge is optional, off by default.</text>
</svg>
