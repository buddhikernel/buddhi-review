<svg viewBox="0 0 980 516" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<defs><marker id="ar" markerWidth="11" markerHeight="11" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#6e7781"/></marker></defs>
<text x="49" y="34" font-size="20" font-weight="700" fill="#1f2328">How a Buddhi review loop works</text>
<text x="49" y="58" font-size="12" fill="#57606a">Different labs. Targeted re-review. Auto-merge only when enabled.</text>
<rect x="49" y="96" width="140" height="32" rx="16" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
<text x="119" y="117" text-anchor="middle" font-size="13" fill="#1f2328">Pull request</text>
<path d="M119,128 L119,154" fill="none" stroke="#6e7781" stroke-width="2" marker-end="url(#ar)"/>
<rect x="49" y="156" width="262" height="117" rx="11" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
<text x="63" y="181" font-size="15" font-weight="700" fill="#1f2328">1 · Review across vendors</text>
<circle cx="68" cy="204" r="5" fill="#C2410C"/>
<text x="79" y="208" font-size="13" fill="#1f2328">Claude</text>
<circle cx="190" cy="204" r="5" fill="#2A78D6"/>
<text x="201" y="208" font-size="13" fill="#1f2328">Codex</text>
<circle cx="68" cy="226" r="5" fill="#1BAF7A"/>
<text x="79" y="230" font-size="13" fill="#1f2328">Gemini</text>
<circle cx="190" cy="226" r="5" fill="#8B95A5"/>
<text x="201" y="230" font-size="13" fill="#1f2328">Copilot</text>
<text x="63" y="256" font-size="13" fill="#57606a">Different labs have different blind spots.</text>
<rect x="359" y="156" width="262" height="182" rx="11" fill="#eef1f4" stroke="#b6bec8" stroke-width="1.5"/>
<text x="373" y="181" font-size="15" font-weight="700" fill="#1f2328">2 · Decide each finding</text>
<rect x="512" y="147" width="95" height="18" rx="9" fill="#eef1f4" stroke="#b6bec8" stroke-width="1"/>
<text x="560" y="159" font-size="12" text-anchor="middle" fill="#57606a">Buddhi kernel</text>
<text x="373" y="208" font-size="13" font-weight="700" fill="#1f2328">Fix</text>
<text x="442" y="208" font-size="13" fill="#57606a">code or PR description</text>
<text x="373" y="229" font-size="13" font-weight="700" fill="#9a5b00">Ask you</text>
<text x="442" y="229" font-size="13" fill="#57606a">genuine judgment needed</text>
<text x="373" y="250" font-size="13" font-weight="700" fill="#1f2328">Skip</text>
<text x="442" y="250" font-size="13" fill="#57606a">invalid or outdated</text>
<text x="373" y="271" font-size="13" font-weight="700" fill="#1f2328">Defer</text>
<text x="442" y="271" font-size="13" fill="#57606a">interruption limit reached</text>
<line x1="373" y1="285" x2="607" y2="285" stroke="#d0d7de" stroke-width="0.75"/>
<text x="373" y="305" font-size="12" fill="#8b949e">Every finding gets an explicit disposition —</text>
<text x="373" y="321" font-size="12" fill="#8b949e">never blind auto-fix.</text>
<rect x="669" y="156" width="262" height="168" rx="11" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
<text x="683" y="181" font-size="15" font-weight="700" fill="#1f2328">3 · Re-review the fixed code</text>
<text x="683" y="208" font-size="13" fill="#1f2328">Re-request reviewers that found</text>
<text x="683" y="226" font-size="13" fill="#1f2328">substantive issues.</text>
<text x="683" y="245" font-size="13" fill="#57606a">Skip those that approved, found</text>
<text x="683" y="263" font-size="13" fill="#57606a">nothing, or were cosmetic-only.</text>
<text x="683" y="289" font-size="13" font-weight="700" fill="#1f2328">Repeat until clean — or the round</text>
<text x="683" y="307" font-size="13" font-weight="700" fill="#1f2328">budget is reached.</text>
<path d="M311,214 L354,214" fill="none" stroke="#6e7781" stroke-width="2" marker-end="url(#ar)"/>
<path d="M621,214 L664,214" fill="none" stroke="#6e7781" stroke-width="2" marker-end="url(#ar)"/>
<path d="M693,324 L693,376 L29,376 L29,214 L46,214" fill="none" stroke="#6e7781" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar)"/>
<text x="361" y="368" font-size="12" text-anchor="middle" fill="#57606a">Substantive fixes applied — review the updated code</text>
<path d="M796,324 L796,396" fill="none" stroke="#6e7781" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="806" y="368" font-size="12" font-weight="700" fill="#1a7f37">✓ Clean round</text>
<rect x="49" y="398" width="882" height="104" rx="11" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
<text x="63" y="424" font-size="15" font-weight="700" fill="#1f2328">4 · Validate and land</text>
<rect x="63" y="438" width="108" height="26" rx="6" fill="#eef1f4" stroke="#d0d7de" stroke-width="0.75"/>
<text x="117" y="455" font-size="13" text-anchor="middle" fill="#1f2328">Run tests / CI</text>
<rect x="389" y="438" width="153" height="26" rx="6" fill="#eef1f4" stroke="#d0d7de" stroke-width="0.75"/>
<text x="466" y="455" font-size="13" text-anchor="middle" fill="#1f2328">Require green checks</text>
<rect x="806" y="438" width="111" height="26" rx="6" fill="#eef1f4" stroke="#d0d7de" stroke-width="0.75"/>
<text x="862" y="455" font-size="13" text-anchor="middle" fill="#1f2328">Squash-merge</text>
<path d="M176,451 L383,451" fill="none" stroke="#6e7781" stroke-width="2" marker-end="url(#ar)"/>
<path d="M547,451 L800,451" fill="none" stroke="#6e7781" stroke-width="2" marker-end="url(#ar)"/>
<text x="63" y="484" font-size="12" fill="#8b949e">Tests and CI decide whether the PR can land. Auto-merge is optional, off by default.</text>
</svg>
