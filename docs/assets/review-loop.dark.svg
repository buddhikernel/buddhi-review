<svg viewBox="0 0 909 487" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<defs><marker id="ar" markerWidth="11" markerHeight="11" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#8b949e"/></marker></defs>
<text x="46" y="34" font-size="18" font-weight="700" fill="#e6edf3">What a Buddhi review loop does each round</text>
<text x="46" y="58" font-size="12.5" fill="#adbac7">Not one model, not the same bots every round, and not a merge without your say-so.</text>
<rect x="46" y="94" width="140" height="32" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="116" y="115" text-anchor="middle" font-size="12.5" fill="#e6edf3">Pull request</text>
<path d="M116,126 L116,150" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#ar)"/>
<rect x="46" y="152" width="242" height="172" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="60" y="176" font-size="13.5" font-weight="700" fill="#e6edf3">1 · Cross-vendor panel</text>
<circle cx="65" cy="220" r="5" fill="#C2410C"/>
<text x="76" y="224" font-size="13" fill="#e6edf3">Claude</text>
<circle cx="176" cy="220" r="5" fill="#2A78D6"/>
<text x="187" y="224" font-size="13" fill="#e6edf3">Codex</text>
<circle cx="65" cy="242" r="5" fill="#1BAF7A"/>
<text x="76" y="246" font-size="13" fill="#e6edf3">Gemini</text>
<circle cx="176" cy="242" r="5" fill="#8B95A5"/>
<text x="187" y="246" font-size="13" fill="#e6edf3">Copilot</text>
<text x="60" y="293" font-size="11.5" fill="#adbac7">Four labs. Their errors don't correlate, so</text>
<text x="60" y="309" font-size="11.5" fill="#adbac7">one panel misses far less.</text>
<rect x="334" y="152" width="242" height="172" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="348" y="176" font-size="13.5" font-weight="700" fill="#e6edf3">2 · Kernel judges each finding</text>
<text x="348" y="216" font-size="13" font-weight="700" fill="#e6edf3">Fix</text>
<text x="348" y="232" font-size="10.5" fill="#adbac7">substantive · cosmetic</text>
<text x="474" y="216" font-size="13" font-weight="700" fill="#e6edf3">Ask you</text>
<text x="474" y="232" font-size="10.5" fill="#adbac7">a judgment call</text>
<text x="348" y="256" font-size="13" font-weight="700" fill="#e6edf3">Skip</text>
<text x="348" y="272" font-size="10.5" fill="#adbac7">invalid · outdated</text>
<text x="474" y="256" font-size="13" font-weight="700" fill="#e6edf3">Defer</text>
<text x="474" y="272" font-size="10.5" fill="#adbac7">budget spent</text>
<text x="348" y="309" font-size="11.5" fill="#adbac7">Decides per finding — never blind auto-fix.</text>
<rect x="622" y="152" width="242" height="172" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="636" y="176" font-size="13.5" font-weight="700" fill="#e6edf3">3 · Re-review each round</text>
<text x="636" y="208" font-size="11.5" fill="#e6edf3">Re-request only the bots that raised a</text>
<text x="636" y="224" font-size="11.5" fill="#e6edf3">substantive finding.</text>
<text x="636" y="248" font-size="11.5" fill="#adbac7">Bots that approved, found nothing, or were</text>
<text x="636" y="264" font-size="11.5" fill="#adbac7">cosmetic-only are dropped from</text>
<text x="636" y="280" font-size="11.5" fill="#adbac7">re-request.</text>
<text x="636" y="309" font-size="12" font-weight="700" fill="#e6edf3">Repeat until a clean round.</text>
<path d="M288,238 L330,238" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#ar)"/>
<path d="M576,238 L618,238" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#ar)"/>
<path d="M652,324 L652,348 L86,348 L86,326" fill="none" stroke="#8b949e" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar)"/>
<text x="369" y="342" text-anchor="middle" font-size="11" fill="#adbac7">re-review the fixed code, next round</text>
<path d="M794,324 L794,376" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#ar)"/>
<text x="804" y="364" font-size="11" fill="#adbac7">clean round</text>
<rect x="46" y="378" width="818" height="95" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="60" y="406" font-size="13.5" font-weight="700" fill="#e6edf3">4 · When a round comes back clean</text>
<text x="60" y="436" font-size="12" fill="#e6edf3">run tests / CI  →  green  →  squash-merge  →  landed</text>
<text x="60" y="458" font-size="10.5" fill="#8b949e">The tests / CI gate runs when the repo enables it. Auto-merge is opt-in and off by default.</text>
</svg>
