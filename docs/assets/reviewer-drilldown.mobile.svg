<text x="16.0" y="457.0" font-size="12" fill="#8b949e">On Runs C, F, and G, Claude posted an explicit all-clear (“No</text>
<text x="16.0" y="473.0" font-size="12" fill="#8b949e">issues found.”); the other reviewers subsequently identified 66</text>
<text x="16.0" y="489.0" font-size="12" fill="#8b949e">valid bugs. On Runs A and B, Claude left review comments rather</text>
<text x="16.0" y="505.0" font-size="12" fill="#8b949e">than an all-clear, but none of those comments identified a valid</text>
<text x="16.0" y="521.0" font-size="12" fill="#8b949e">bug. Each bug is credited to one catching reviewer. Ledger data,</text>
<text x="16.0" y="537.0" font-size="12" fill="#8b949e">repo anonymized.</text>
