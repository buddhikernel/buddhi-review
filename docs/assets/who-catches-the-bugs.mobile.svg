<text x="414.0" y="272.0" font-size="12" font-weight="700" text-anchor="end" fill="#1f2328">Claude = 3.8%</text>
<text x="16.0" y="326.0" font-size="12" fill="#8b949e">Flat stubs are zero. In 14 of these 20 runs Claude reviewed the</text>
<text x="16.0" y="342.0" font-size="12" fill="#8b949e">code and caught nothing.</text>
<text x="16.0" y="359.0" font-size="13" font-weight="700" fill="#B01722">Across all 88 qualifying runs, Claude caught 3.8% of</text>
<text x="16.0" y="376.0" font-size="13" font-weight="700" fill="#B01722">the valid bugs. Reviewers from other vendors caught</text>
<text x="16.0" y="393.0" font-size="13" font-weight="700" fill="#B01722">96.2%.</text>
<text x="16.0" y="409.0" font-size="12" fill="#8b949e">Claude caught 18 of the 189 high or critical bugs (9.5%). Of the</text>
<text x="16.0" y="425.0" font-size="12" fill="#8b949e">high or critical bugs found in round 2 or later, 93.5% came from a</text>
<text x="16.0" y="441.0" font-size="12" fill="#8b949e">non-Claude</text>
<text x="16.0" y="457.0" font-size="12" fill="#8b949e">reviewer.</text>
