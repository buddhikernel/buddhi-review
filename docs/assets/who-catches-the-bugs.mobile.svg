<text x="16.0" y="60.0" font-size="12" fill="#57606a">Each bar is one qualifying run with 10 or more valid bugs (all 20</text>
<text x="16.0" y="76.0" font-size="12" fill="#57606a">of them). Bar height: the share of that run’s bugs that Claude</text>
<text x="16.0" y="92.0" font-size="12" fill="#57606a">caught. The bold line is the aggregate over all 88 qualifying runs</text>
<text x="16.0" y="108.0" font-size="12" fill="#57606a">(681 bugs). Ledger data, repo anonymized.</text>
